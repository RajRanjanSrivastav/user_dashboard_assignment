<div class="min-h-screen bg-[#dddedf] p-8">
  <div
    class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8"
  >
    <div>
      <h1 class="text-3xl font-bold text-[#383838]">User Dashboard</h1>

      <p class="text-sm text-gray-500 mt-1">
        Manage users and monitor role distribution
      </p>
    </div>

    <button
      (click)="openModal()"
      class="h-12 px-6 rounded-xl bg-[#1c4980] text-white font-medium hover:opacity-90 transition-all duration-200"
    >
      Add User
    </button>
  </div>

  <!-- MAIN GRID -->
  <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
    <!-- USER TABLE -->
    <div class="xl:col-span-2">
      <app-user-table [users]="users()" />
    </div>

    <!-- CHART -->
    <div>
      @defer {
        <app-role-chart [users]="users()" />
      } @placeholder {
        <div
          class="bg-white rounded-2xl border border-gray-100 shadow-[0_4px_20px_rgba(0,0,0,0.04)] hover:shadow-[0_8px_30px_rgba(28,73,128,0.10)] transition-all duration-300 p-6"
        >
          <div class="mb-6">
            <div class="h-6 w-40 rounded-md bg-gray-100 mb-3"></div>

            <div class="h-4 w-52 rounded-md bg-gray-100"></div>
          </div>

          <div
            class="h-[320px] rounded-2xl bg-gray-50 border border-dashed border-gray-200 flex items-center justify-center"
          >
            <div class="text-center">
              <div
                class="h-10 w-10 rounded-full border-4 border-[#1c4980]/20 border-t-[#1c4980] animate-spin mx-auto mb-4"
              ></div>

              <p class="text-sm text-gray-400">Loading chart...</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>

  <!-- MODAL CONTAINER -->
  <ng-template #modalContainer />
</div>
