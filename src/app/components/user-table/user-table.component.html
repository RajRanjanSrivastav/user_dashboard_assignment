<div
  class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden"
>
  <!-- HEADER -->

  <div
    class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 p-6 border-b border-gray-100"
  >
    <!-- LEFT -->

    <div>
      <div class="flex items-center gap-3">
        <h2 class="text-xl font-semibold text-[#383838]">Users</h2>

        <span
          class="px-3 py-1 rounded-full text-xs font-semibold bg-[#1c4980]/10 text-[#1c4980]"
        >
          {{ filteredUsers().length }}
        </span>
      </div>

      <p class="text-sm text-gray-500 mt-1">Manage and monitor user access</p>
    </div>

    <!-- SEARCH -->

    <div class="relative w-full md:w-72">
      <input
        type="text"
        [value]="searchText()"
        (input)="searchText.set($any($event.target).value)"
        placeholder="Search users..."
        class="h-12 w-full rounded-xl border border-gray-200 bg-white pl-11 pr-4 text-sm focus:outline-none focus:border-[#1c4980] focus:ring-4 focus:ring-[#1c4980]/10 transition-all"
      />

      <!-- ICON -->

      <span
        class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"
      >
        🔍
      </span>
    </div>
  </div>

  <!-- TABLE -->

  <div class="overflow-x-auto">
    <table class="w-full border-collapse">
      <!-- TABLE HEAD -->

      <thead>
        <tr class="bg-[#2f3640] border-b border-[#3b4350]">
          <th
            class="text-left text-[11px] font-semibold uppercase tracking-widest text-gray-300 px-6 py-4"
          >
            Sr. No
          </th>

          <th
            class="text-left text-[11px] font-semibold uppercase tracking-widest text-gray-300 px-6 py-4"
          >
            Name
          </th>

          <th
            class="text-left text-[11px] font-semibold uppercase tracking-widest text-gray-300 px-6 py-4"
          >
            Email
          </th>

          <th
            class="text-left text-[11px] font-semibold uppercase tracking-widest text-gray-300 px-6 py-4"
          >
            Role
          </th>
        </tr>
      </thead>

      <!-- TABLE BODY -->

      <tbody>
        @for (user of paginatedUsers(); track user.id; let index = $index) {
          <tr
            class="border-b border-gray-100 hover:bg-[#f8fbff] transition-all duration-200"
          >
            <!-- SR NO -->

            <td class="px-6 py-5 text-sm font-medium text-gray-500">
              {{ index + 1 }}
            </td>

            <!-- NAME -->

            <td class="px-6 py-5">
              <div class="flex items-center gap-4">
                <div>
                  <h3 class="font-semibold text-[#383838]">
                    {{ user.name }}
                  </h3>
                </div>
              </div>
            </td>

            <!-- EMAIL -->

            <td class="px-6 py-5 text-sm text-gray-600">
              {{ user.email }}
            </td>

            <!-- ROLE -->

            <td class="px-6 py-5">
              <span
                [class]="
                  user.role === 'Admin'
                    ? 'bg-blue-100 text-blue-700'
                    : user.role === 'Editor'
                      ? 'bg-purple-100 text-purple-700'
                      : 'bg-orange-100 text-orange-700'
                "
                class="inline-flex items-center px-4 py-2 rounded-full text-xs font-semibold"
              >
                <span class="h-2 w-2 rounded-full bg-current mr-2"></span>

                {{ user.role }}
              </span>
            </td>
          </tr>
        } @empty {
          <!-- EMPTY -->

          <tr>
            <td colspan="4" class="py-20 text-center">
              <div class="flex flex-col items-center justify-center">
                <!-- ICON -->

                <div
                  class="h-16 w-16 rounded-full bg-[#1c4980]/10 flex items-center justify-center mb-4 animate-pulse"
                >
                  👥
                </div>

                <!-- TEXT -->

                <h3 class="text-lg font-semibold text-[#383838]">
                  No Users Found
                </h3>

                <p class="text-sm text-gray-400 mt-1">
                  Try adjusting your search
                </p>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>

    <app-pagination
      [currentPage]="currentPage()"
      [totalItems]="filteredUsers().length"
      [itemsPerPage]="itemsPerPage"
      (pageChange)="updatePage($event)"
    />
  </div>
</div>
